services:
  openclaw-core:
    depends_on:
      - openclaw-browser

  openclaw-browser:
    image: ghcr.io/browserless/chromium:latest
    container_name: openclaw-browser
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      - PORT=9222
      - CONNECTION_TIMEOUT=600000
      - CHROME_REFRESH_TIME=600000
      - DEFAULT_BLOCK_ADS=true
      - DEFAULT_STEALTH=true
    ports:
      - "9222:9222"
    volumes:
      - browser_profile:/home/browserless/chrome/user-data

volumes:
  browser_profile:
